<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArkM</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 标题栏 -->
  <div id="title-bar">
    <span id="title-text">ArkM - 明日方舟音乐终端</span>
    <div id="title-actions">
      <button class="title-btn" id="min-btn">
        <i class="material-icons">minimize</i>
      </button>
      <button class="title-btn title-close" id="close-btn">
        <i class="material-icons">close</i>
      </button>
    </div>
  </div>

  <!-- 主区域 -->
  <div id="body-wrap">
    <!-- 侧栏 -->
    <nav id="sidebar">
      <button class="nav-btn active" data-view="0">
        <i class="material-icons nav-icon">download</i>
        <span>待下载</span>
      </button>
      <button class="nav-btn" data-view="1">
        <i class="material-icons nav-icon">library_music</i>
        <span>本机曲库</span>
      </button>
    </nav>

    <!-- 封面网格 -->
    <div id="cover-area">
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="搜索歌曲...">
      </div>
      <div id="cover-grid"></div>
    </div>

    <!-- 日志侧栏 -->
    <aside id="log-panel">
      <div id="log-header">
        <button id="log-toggle">
          <i class="material-icons">chevron_right</i>
        </button>
        <span>日志</span>
        <button id="log-clear">清空</button>
      </div>
      <pre id="log-output"></pre>
    </aside>
  </div>

  <!-- 弹出面板 -->
  <div id="popup-panel">
    <div id="popup-content">
      <div id="popup-cover-area">
        <img id="popup-cover" src="" alt="">
      </div>
      <div id="popup-info">
        <h2 id="popup-song-title"></h2>
        <ul id="popup-queue-list"></ul>
      </div>
    </div>
  </div>

  <!-- 底部播放条 -->
  <div id="player-bar">
    <button id="btn-play" title="播放">
      <i class="material-icons">play_arrow</i>
    </button>
    <button id="btn-pause" title="停止">
      <i class="material-icons">stop</i>
    </button>
    <div id="progress-container">
      <input type="range" id="progress-bar" min="0" max="1000" value="0">
    </div>
    <span id="time-label">00:00 / 00:00</span>
    <div id="volume-container">
      <i class="material-icons vol-icon">volume_up</i>
      <input type="range" id="volume-bar" min="0" max="100" value="50">
    </div>
    <div class="bar-spacer"></div>
    <button id="bar-cover-btn" title="当前歌曲"></button>
    <button id="bar-queue-btn" title="播放列表">
      <i class="material-icons">queue_music</i>
    </button>
  </div>

  <audio id="audio-player" preload="none"></audio>
  <script src="app.js"></script>
</body>
</html>
